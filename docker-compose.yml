services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ytmp3_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Named volume keeps downloaded MP3s off the host filesystem
      - mp3_downloads:/app/downloads
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # This URL must be reachable from the USER'S BROWSER, not from inside Docker.
        # Change to your server's IP/domain when deploying remotely.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: ytmp3_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  mp3_downloads:
    driver: local
